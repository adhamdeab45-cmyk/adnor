services:
  - type: web
    name: adnor-v9
    runtime: node
    plan: free
    buildCommand: npm install --registry=https://registry.npmjs.org/
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: FIREBASE_DATABASE_URL
        value: https://adnor-vp-default-rtdb.firebaseio.com
      - key: DRAW_TIMEZONE
