<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ADNOR Agent | وكيل الشحن</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/css/base.css" />
</head>
<body>
  <header class="topbar"><div class="wrap"><div class="brand"><div class="logo">AG</div><div><b>ADNOR Agent</b><div class="muted">صفحة الوكيل منفصلة</div></div></div><div id="agentAuthBox"></div></div></header>
  <main class="wrap">
    <section id="agentLoginPanel" class="panel">
      <h1>دخول وكيل الشحن</h1>
      <div class="grid"><div class="col-6"><label>اسم الدخول أو الإيميل</label><input id="agentLoginId" class="input" placeholder="agent1"></div><div class="col-6"><label>كلمة السر</label><input id="agentLoginPass" class="input" type="password"></div></div>
      <button id="btnAgentLogin" class="btn" style="margin-top:12px">دخول</button>
      <div id="agentLoginStatus" class="status info"></div>
    </section>
    <section id="agentApp" class="hide">
      <div class="grid">
        <div class="col-4 card"><div class="muted">رصيد الوكيل</div><div id="agentBalanceBox" class="big gold">$0.00</div></div>
        <div class="col-4 card"><div class="muted">إجمالي الشحن</div><div id="agentTotalBox" class="big green">$0.00</div></div>
        <div class="col-4 card"><div class="muted">الحالة</div><div id="agentActiveBox" class="big">-</div></div>
      </div>
      <section class="panel" style="margin-top:14px">
        <h2>شحن مستخدم</h2>
        <label>ID المستخدم / UID / البريد / كود الدعوة</label><input id="targetUser" class="input ltr" placeholder="UID أو email أو refCode">
        <label>المبلغ بالدولار</label><input id="rechargeAmount" class="input" type="number" min="0.01" step="0.01">
        <label>ملاحظة</label><textarea id="rechargeNote" class="input" rows="3"></textarea>
        <button id="btnAgentRecharge" class="btn" style="margin-top:12px">تنفيذ الشحن</button>
        <div id="rechargeStatus" class="status info"></div>
      </section>
    </section>
  </main>
  <script type="module" src="./assets/js/agent/agent-main.js"></script>
</body>
</html>
