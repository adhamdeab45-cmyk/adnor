<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#071126" />
  <title>ADNOR | المنصة الملكية</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-analytics-compat.js"></script>
  <style>
    :root{--bg:#071126;--bg2:#0b1e45;--card:#0d2147cc;--card2:#102c61cc;--gold:#ffd56a;--gold2:#d4af37;--text:#fff8dd;--muted:#b7c8e8;--green:#39ff9d;--red:#ff6666;--blue:#51b7ff;--line:rgba(255,213,106,.35);--shadow:0 22px 70px rgba(0,0,0,.45)}
    *{box-sizing:border-box}html,body{margin:0;min-height:100%;font-family:'IBM Plex Sans Arabic',system-ui,sans-serif;background:radial-gradient(circle at 10% 5%,#173b7c 0,#071126 35%,#030712 100%);color:var(--text)}
    body:before{content:"";position:fixed;inset:0;background-image:radial-gradient(#ffd56a44 1px,transparent 1px),linear-gradient(125deg,transparent 0 42%,rgba(255,213,106,.08) 45%,transparent 48%);background-size:34px 34px,100% 100%;pointer-events:none;animation:stars 16s linear infinite}@keyframes stars{from{background-position:0 0,0 0}to{background-position:80px -120px,0 0}}
    button,input,select,textarea{font-family:inherit}button{cursor:pointer}.hidden{display:none!important}.ltr{direction:ltr}.center{text-align:center}.danger{color:var(--red)}.ok{color:var(--green)}.muted{color:var(--muted)}
    .wrap{max-width:1180px;margin:0 auto;padding:14px}.royal-card{border:1px solid var(--line);border-radius:28px;background:linear-gradient(145deg,rgba(10,27,61,.95),rgba(8,20,45,.86));box-shadow:var(--shadow),inset 0 0 40px rgba(255,213,106,.04);backdrop-filter:blur(10px)}
    .login-shell{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:22px}.login-card{width:min(520px,100%);padding:32px 22px;position:relative;overflow:hidden}.login-card:after{content:"";position:absolute;inset:-45%;background:conic-gradient(from 180deg,transparent,#ffd56a22,transparent,#51b7ff22,transparent);animation:spin 10s linear infinite;z-index:-1}@keyframes spin{to{transform:rotate(360deg)}}
    .brand{font-size:50px;font-weight:800;letter-spacing:2px;color:var(--gold);text-align:center;text-shadow:0 0 22px #ffd56a70}.subtitle{text-align:center;color:#d7e4ff;margin-top:6px;margin-bottom:20px}.laser{height:2px;background:linear-gradient(90deg,transparent,var(--gold),#fff,var(--gold),transparent);box-shadow:0 0 16px var(--gold);margin:18px 0}
    .login-btn{width:100%;border:0;border-radius:22px;padding:18px;background:linear-gradient(180deg,#fff,#f4f4f4);color:#382500;font-weight:800;font-size:20px;box-shadow:0 12px 26px rgba(255,213,106,.25);display:flex;align-items:center;justify-content:center;gap:10px}.login-btn:hover{transform:translateY(-1px)}
    .domain-box{margin-top:16px;border:1px dashed var(--line);border-radius:18px;padding:13px;text-align:center}.domain-copy{display:block;width:100%;border:1px solid var(--line);border-radius:16px;padding:12px;background:#08162e;color:var(--text);font-weight:700;margin-top:8px}
    .login-log{margin-top:14px;background:#031027;border:1px solid #51b7ff55;border-radius:16px;color:#bff0ff;padding:10px;max-height:110px;overflow:auto;font:12px ui-monospace,monospace;direction:ltr;text-align:left}.tiny{font-size:12px;color:#a8bce0}.topbar{position:sticky;top:0;z-index:30;background:rgba(4,13,31,.88);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
    .topbar-inner{max-width:1180px;margin:0 auto;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px}.logo{font-weight:800;color:var(--gold);font-size:28px}.user-pill{border:1px solid var(--line);border-radius:18px;padding:8px 12px;background:#071833;display:flex;gap:10px;align-items:center}.balance-pill{border:1px solid var(--line);border-radius:18px;padding:8px 14px;color:var(--green);background:#071833;font-weight:800;direction:ltr}.icon-btn{border:1px solid var(--line);background:#0b214a;color:var(--text);border-radius:14px;padding:9px 12px;font-weight:700}
    .page{display:none;padding:18px 0 88px}.page.active{display:block}.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:16px}.col-12{grid-column:span 12}.col-8{grid-column:span 8}.col-6{grid-column:span 6}.col-4{grid-column:span 4}.col-3{grid-column:span 3}@media(max-width:900px){.col-8,.col-6,.col-4,.col-3{grid-column:span 12}.topbar-inner{flex-wrap:wrap}.brand{font-size:42px}}
    .section{padding:18px}.section h2,.section h3{margin:0 0 14px;color:var(--gold)}.stat{padding:14px;border:1px solid var(--line);border-radius:18px;background:#0b1d3d}.stat b{display:block;font-size:25px;color:var(--green);direction:ltr}.tabs{display:flex;gap:8px;overflow:auto;margin:8px 0 16px}.tab{white-space:nowrap;border:1px solid var(--line);border-radius:18px;background:#0a1b3b;color:var(--text);padding:10px 16px;font-weight:700}.tab.active{background:linear-gradient(180deg,#ffd56a,#d49d24);color:#1f1400}
    .field{display:flex;flex-direction:column;gap:7px;margin-bottom:12px}.field label{font-size:13px;color:#d9e5ff}.input,.select,.textarea{width:100%;border:1px solid var(--line);background:#06142d;color:var(--text);border-radius:15px;padding:12px;outline:none}.textarea{min-height:100px;resize:vertical}.btn{border:0;border-radius:16px;padding:12px 16px;background:linear-gradient(180deg,#ffd56a,#c88c18);color:#1b1000;font-weight:800}.btn.secondary{background:#0b214a;color:var(--text);border:1px solid var(--line)}.btn.green{background:linear-gradient(180deg,#54ffab,#17b36a)}.btn.red{background:linear-gradient(180deg,#ff7777,#b92626);color:#fff}.btn.full{width:100%}
    .bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:50;background:#041025e8;border-top:1px solid var(--line);backdrop-filter:blur(12px)}.bottom-inner{max-width:700px;margin:auto;display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:8px}.navbtn{border:0;background:transparent;color:#d8e6ff;border-radius:16px;padding:9px 5px;font-weight:700}.navbtn.active{background:#102b5e;color:var(--gold)}
    .lottery-number{font-size:34px;font-weight:800;letter-spacing:8px;direction:ltr;text-align:center;padding:14px;border:1px solid var(--line);border-radius:18px;background:linear-gradient(180deg,#071a38,#050b17);text-shadow:0 0 14px #ffd56a}.prize{font-size:44px;color:var(--green);font-weight:800;direction:ltr;text-shadow:0 0 26px #39ff9d80}.wheel-wrap{display:flex;justify-content:center;align-items:center;flex-direction:column;gap:15px}.wheel{width:min(360px,86vw);aspect-ratio:1;border-radius:50%;border:12px solid #d4af37;box-shadow:0 0 36px #ffd56a55, inset 0 0 28px #000;background:conic-gradient(#111 0 27.69deg,#d4af37 27.69deg 55.38deg,#1b63af 55.38deg 83.07deg,#ce2a2a 83.07deg 110.76deg,#178d3b 110.76deg 138.45deg,#6d1fa4 138.45deg 166.14deg,#111 166.14deg 193.83deg,#128a78 193.83deg 221.52deg,#c26a13 221.52deg 249.21deg,#113d7a 249.21deg 276.9deg,#d4af37 276.9deg 304.59deg,#222 304.59deg 332.28deg,#d92222 332.28deg 360deg);position:relative;transition:transform 4s cubic-bezier(.1,.8,.2,1)}.wheel:before{content:"AD";position:absolute;inset:35%;border-radius:50%;background:radial-gradient(circle,#fff1a5,#ca8d19);display:flex;align-items:center;justify-content:center;color:#251700;font-weight:900;font-size:30px;border:4px solid #ffd56a}.pointer{width:0;height:0;border-left:22px solid transparent;border-right:22px solid transparent;border-top:42px solid var(--gold);filter:drop-shadow(0 0 10px #ffd56a)}
    .list{display:flex;flex-direction:column;gap:10px}.item{border:1px solid var(--line);border-radius:18px;padding:12px;background:#071833}.item-head{display:flex;justify-content:space-between;gap:10px;align-items:center;flex-wrap:wrap}.badge{display:inline-block;border:1px solid var(--line);border-radius:999px;padding:4px 9px;background:#08214a;color:var(--gold);font-size:12px}.admin-shell{display:grid;grid-template-columns:260px 1fr;gap:16px}.admin-menu{position:sticky;top:80px;height:calc(100vh - 95px);overflow:auto}.admin-link{display:block;width:100%;text-align:right;border:0;background:transparent;color:#eaf2ff;padding:13px;border-radius:14px;font-weight:700}.admin-link.active,.admin-link:hover{background:#15376e;color:var(--gold)}@media(max-width:950px){.admin-shell{grid-template-columns:1fr}.admin-menu{position:relative;top:0;height:auto;display:grid;grid-template-columns:repeat(2,1fr)}}
    .modal{position:fixed;inset:0;background:#000a;display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}.modal-card{width:min(540px,100%);padding:24px}.toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);z-index:120;background:#06142d;border:1px solid var(--line);border-radius:16px;padding:12px 18px;box-shadow:var(--shadow)}
    table{width:100%;border-collapse:collapse;overflow:hidden;border-radius:16px}td,th{border-bottom:1px solid #ffffff1f;padding:10px;text-align:right}th{color:var(--gold)}.receipt-img{max-width:100%;max-height:260px;border-radius:14px;border:1px solid var(--line)}
  </style>
</head>
<body>
  <div id="toast" class="toast hidden"></div>

  <section id="loginView" class="login-shell">
    <div class="royal-card login-card">
      <div class="brand">ADNOR</div>
      <div class="subtitle">تسجيل آمن عبر Google فقط — النسخة V9 من الصفر</div>
      <div class="laser"></div>
      <button id="googleLoginBtn" class="login-btn"><span style="font-size:28px">G</span> تسجيل الدخول بجوجل</button>
      <div class="domain-box">
        <b>دومين الموقع الحالي</b>
        <button id="copyDomainBtn" class="domain-copy ltr">...</button>
        <p class="tiny">إذا Google رفض الدخول، أضف هذا الدومين في Firebase Authorized domains.</p>
      </div>
      <div id="loginMsg" class="tiny center" style="margin-top:12px"></div>
      <details style="margin-top:12px"><summary class="tiny">تفاصيل فحص الدخول</summary><div id="loginLog" class="login-log"></div></details>
    </div>
  </section>

  <section id="appView" class="hidden">
    <header class="topbar">
      <div class="topbar-inner">
        <div class="logo">ADNOR ♛</div>
        <div class="user-pill"><span id="safeUserName">ADNOR USER</span><span class="badge ltr" id="shortUserId">-----</span></div>
        <div class="balance-pill" id="topBalance">$0.00</div>
        <button id="menuBtn" class="icon-btn">☰</button>
      </div>
    </header>

    <main class="wrap">
      <section id="pageLottery" class="page active"></section>
      <section id="pageGames" class="page"></section>
      <section id="pageWallet" class="page"></section>
      <section id="pageSupport" class="page"></section>
      <section id="pageAdmin" class="page"></section>
    </main>

    <nav class="bottom-nav">
      <div class="bottom-inner">
        <button class="navbtn active" data-page="Lottery">🎯 اليانصيب</button>
        <button class="navbtn" data-page="Games">🎮 الألعاب</button>
        <button class="navbtn" data-page="Wallet">💰 المحفظة</button>
        <button class="navbtn" data-page="Support">💬 الدعم</button>
      </div>
    </nav>
  </section>

  <script>
    'use strict';

    const ADNOR_VERSION = 'ADNOR_V9_GOOGLE_ONLY_REBUILD';
    const ADMIN_EMAIL = 'adhamdeab45@gmail.com';
    const ADMIN_PHONE = '+905445034910';
    const firebaseConfig = {
      apiKey: 'AIzaSyBpklFtIKgxmnLCpk7Zi00p5lxny966mpM',
      authDomain: 'adnor-vp.firebaseapp.com',
      databaseURL: 'https://adnor-vp-default-rtdb.firebaseio.com',
      projectId: 'adnor-vp',
      storageBucket: 'adnor-vp.firebasestorage.app',
      messagingSenderId: '808457533052',
      appId: '1:808457533052:web:d7d2bcef237c2214be3bf9',
      measurementId: 'G-Q8SV80V1TN'
    };

    const app = firebase.initializeApp(firebaseConfig);
    try { firebase.analytics(); } catch(e) {}
    const auth = firebase.auth();
    const db = firebase.database();
    auth.languageCode = 'ar';

    const $ = (id) => document.getElementById(id);
    const ref = (path) => db.ref(path);
    const now = () => Date.now();
    const money = (n) => '$' + (Number(n || 0)).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    const safe = (s='') => String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
    const shortId = (uid='') => uid.slice(0,5).toUpperCase();
    const dateTime = (t) => t ? new Date(t).toLocaleString('ar-TR') : '-';
    function toast(msg){ const t=$('toast'); t.textContent=msg; t.classList.remove('hidden'); setTimeout(()=>t.classList.add('hidden'),2600); }
    function logLogin(msg){ const box=$('loginLog'); box.innerHTML += `<div>${new Date().toLocaleTimeString()} ${safe(msg)}</div>`; box.scrollTop = box.scrollHeight; }

    let currentUser = null;
    let userProfile = null;
    let isAdmin = false;
    let globalSettings = {};
    let unsubscribers = [];

    const DEFAULTS = {
      lottery: {
        daily: { prize: 4500, visibleParticipants: 0, winnerNumber: '', status: 'waiting', scheduleAt8: false },
        weekly: { prize: 15000, visibleParticipants: 0, winnerNumber: '', status: 'waiting', scheduleAt8: false },
        monthly: { prize: 50000, visibleParticipants: 0, winnerNumber: '', status: 'waiting', scheduleAt8: false },
        yearly: { prize: 500000, visibleParticipants: 0, winnerNumber: '', status: 'waiting', scheduleAt8: false }
      },
      games: { wheelActive: true, minBet: 1, maxBet: 100, houseMode: 'weighted' },
      dailyBox: { active: true, fixedReward: 0, minReward: .05, maxReward: 1, cooldownHours: 24 },
      referralBonus: { active: true, referrerReward: 1, newUserReward: 1, rewardType: 'real' },
      depMethods: { usdt: { name: 'USDT TRC20', active: true, min: 5, address: 'ضع عنوان USDT من الأدمن' } },
      witMethods: { usdt: { name: 'USDT TRC20', active: true, min: 5 } },
      wheel_segments: [
        { label:'x1', type:'multiplier', value:1, weight:30 },{ label:'x2', type:'multiplier', value:2, weight:20 },{ label:'x4', type:'multiplier', value:4, weight:12 },{ label:'x8', type:'multiplier', value:8, weight:7 },{ label:'x16', type:'multiplier', value:16, weight:4 },{ label:'x32', type:'multiplier', value:32, weight:2 },{ label:'x64', type:'multiplier', value:64, weight:1 },{ label:'x128', type:'multiplier', value:128, weight:.6 },{ label:'x236', type:'multiplier', value:236, weight:.3 },{ label:'x472', type:'multiplier', value:472, weight:.1 },{ label:'5 تذاكر', type:'tickets', value:5, weight:7 },{ label:'x1000', type:'multiplier', value:1000, weight:.05 },{ label:'x0', type:'multiplier', value:0, weight:35 }
      ],
      welcome: { active: true, title: 'أهلاً بك في ADNOR', message: 'منصة ملكية لليانصيب والألعاب. العب بمسؤولية.', seconds: 3 },
      toggles: { showServerBadge: false }
    };

    function isAdminUser(user){ return !!user && (user.email === ADMIN_EMAIL || user.phoneNumber === ADMIN_PHONE); }
    async function get(path, fallback=null){ const s = await ref(path).once('value'); return s.exists() ? s.val() : fallback; }
    async function set(path, value){ return ref(path).set(value); }
    async function update(path, value){ return ref(path).update(value); }
    async function push(path, value){ return ref(path).push({ ...value, createdAt: now() }); }

    $('copyDomainBtn').textContent = location.hostname;
    $('copyDomainBtn').onclick = async () => { await navigator.clipboard.writeText(location.hostname); toast('تم نسخ الدومين'); };
    $('googleLoginBtn').onclick = async () => {
      $('loginMsg').textContent = 'يتم تحويلك إلى Google...';
      logLogin('Google redirect start domain=' + location.hostname + ' authDomain=' + firebaseConfig.authDomain);
      try {
        const provider = new firebase.auth.GoogleAuthProvider();
        provider.setCustomParameters({ prompt: 'select_account' });
        await auth.signInWithRedirect(provider);
      } catch (err) {
        logLogin('Google redirect error: ' + err.code + ' ' + err.message);
        $('loginMsg').textContent = 'خطأ Google: ' + (err.code || err.message);
      }
    };

    auth.getRedirectResult().then((result) => {
      if (result && result.user) logLogin('Redirect result user=' + result.user.uid);
      else logLogin('No redirect result pending');
    }).catch((err) => {
      logLogin('Redirect result error: ' + err.code + ' ' + err.message);
      $('loginMsg').textContent = 'خطأ رجوع Google: ' + (err.code || err.message);
    });

    auth.onAuthStateChanged(async (user) => {
      currentUser = user;
      logLogin('onAuthStateChanged=' + (user ? user.uid : 'NULL'));
      if (!user) { showLogin(); return; }
      isAdmin = isAdminUser(user);
      await bootstrapUser(user);
      await loadGlobalSettings();
      showApp();
      renderAll();
      attachLiveListeners();
      showWelcomeOnce();
    });

    function showLogin(){ $('loginView').classList.remove('hidden'); $('appView').classList.add('hidden'); }
    function showApp(){ $('loginView').classList.add('hidden'); $('appView').classList.remove('hidden'); }

    async function bootstrapUser(user){
      const path = 'users/' + user.uid;
      const existing = await get(path, null);
      const referralCode = existing?.referralCode || ('AD' + shortId(user.uid) + Math.floor(Math.random()*90+10));
      const base = {
        uid: user.uid,
        displayName: user.displayName || 'ADNOR USER',
        email: user.email || null,
        phone: user.phoneNumber || null,
        photoURL: user.photoURL || null,
        userCode: shortId(user.uid),
        referralCode,
        realBalance: Number(existing?.realBalance || 0),
        bonusBalance: Number(existing?.bonusBalance || 0),
        reservedBalance: Number(existing?.reservedBalance || 0),
        tickets: Number(existing?.tickets || 0),
        role: isAdmin ? 'admin' : (existing?.role || 'user'),
        lastLoginAt: now(),
        createdAt: existing?.createdAt || now()
      };
      await update(path, base);
      userProfile = { ...(existing||{}), ...base };
      await set('referral_lookup/' + referralCode, user.uid).catch(()=>{});
    }

    async function loadGlobalSettings(){
      const gs = await get('global_system', {});
      globalSettings = mergeDeep(JSON.parse(JSON.stringify(DEFAULTS)), gs || {});
      if (isAdmin && !gs.__v9_seeded) {
        await update('global_system', { ...globalSettings, __v9_seeded: true, updatedAt: now() }).catch(()=>{});
      }
    }
    function mergeDeep(target, source){
      for (const k in source) {
        if (source[k] && typeof source[k] === 'object' && !Array.isArray(source[k])) target[k] = mergeDeep(target[k] || {}, source[k]);
        else target[k] = source[k];
      }
      return target;
    }

    function attachLiveListeners(){
      unsubscribers.forEach(fn => fn()); unsubscribers = [];
      const userRef = ref('users/' + currentUser.uid);
      userRef.on('value', s => { userProfile = s.val() || userProfile; updateHeader(); renderCurrentPage(); });
      unsubscribers.push(()=>userRef.off());
      const gsRef = ref('global_system');
      gsRef.on('value', s => { globalSettings = mergeDeep(JSON.parse(JSON.stringify(DEFAULTS)), s.val() || {}); renderCurrentPage(); });
      unsubscribers.push(()=>gsRef.off());
    }

    function updateHeader(){
      $('safeUserName').textContent = (userProfile?.displayName || 'ADNOR USER').replace(/@.*/, '');
      $('shortUserId').textContent = userProfile?.userCode || shortId(currentUser?.uid || '');
      $('topBalance').textContent = money(userProfile?.realBalance || 0);
    }

    function showPage(name){
      document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
      $('page'+name).classList.add('active');
      document.querySelectorAll('.navbtn').forEach(b=>b.classList.toggle('active', b.dataset.page===name));
      renderCurrentPage();
    }
    document.querySelectorAll('.navbtn').forEach(b=>b.onclick=()=>showPage(b.dataset.page));
    $('menuBtn').onclick = () => { if (isAdmin) showPage('Admin'); else toast('القائمة: الأدمن يظهر للحساب الرسمي فقط'); };

    function renderAll(){ updateHeader(); renderLottery(); renderGames(); renderWallet(); renderSupport(); renderAdmin(); }
    function renderCurrentPage(){ const active = document.querySelector('.page.active')?.id || ''; if(active==='pageLottery')renderLottery(); if(active==='pageGames')renderGames(); if(active==='pageWallet')renderWallet(); if(active==='pageSupport')renderSupport(); if(active==='pageAdmin')renderAdmin(); updateHeader(); }

    function renderLottery(){
      const l = globalSettings.lottery || DEFAULTS.lottery;
      const tabs = ['daily','weekly','monthly','yearly'];
      const names = {daily:'اليومي', weekly:'الأسبوعي', monthly:'الشهري', yearly:'السنوي'};
      $('pageLottery').innerHTML = `<div class="grid">
        <div class="col-12 royal-card section"><h2>🎯 يانصيب ADNOR الملكي</h2><div class="tabs">${tabs.map((t,i)=>`<button class="tab ${i===0?'active':''}" data-ltab="${t}">${names[t]}</button>`).join('')}</div><div id="lotteryPanel"></div></div>
      </div>`;
      document.querySelectorAll('[data-ltab]').forEach(btn=>btn.onclick=()=>{document.querySelectorAll('[data-ltab]').forEach(b=>b.classList.remove('active'));btn.classList.add('active');drawLotteryPanel(btn.dataset.ltab);});
      drawLotteryPanel('daily');
    }
    function drawLotteryPanel(type){
      const d = globalSettings.lottery?.[type] || {};
      const isDaily = type==='daily';
      $('lotteryPanel').innerHTML = `<div class="grid">
        <div class="col-6"><div class="stat"><span>قيمة الجائزة الحالية</span><b>${money(d.prize || 0)}</b></div></div>
        <div class="col-6"><div class="stat"><span>المشاركون الظاهرون</span><b>${Number(d.visibleParticipants || 0)}</b></div></div>
        <div class="col-12"><div class="lottery-number">${safe(d.winnerNumber || '----')}</div><p class="center muted">حالة آخر سحب: ${safe(d.status || 'waiting')}</p></div>

      const reward = Number(box.fixedReward || 0) > 0 ? Number(box.fixedReward) : +(Number(box.minReward||0) + Math.random()*(Number(box.maxReward||1)-Number(box.minReward||0))).toFixed(2);

    function pickWeighted(segments){ const total=segments.reduce((a,s)=>a+Number(s.weight||0),0); let r=Math.random()*total; for(const s of segments){ r-=Number(s.weight||0); if(r<=0)return s; } return segments[segments.length-1]; }
    window.spinWheel = async function(){
      const bet = Math.max(1, Number($('wheelBet').value||1));
      if ((userProfile.realBalance||0) < bet) return toast('الرصيد غير كافٍ');
      const forced = await get('global_system/wheel_forced/'+currentUser.uid, null);
      const segments = globalSettings.wheel_segments || DEFAULTS.wheel_segments;
      const seg = forced?.label ? segments.find(s=>s.label===forced.label) || pickWeighted(segments) : pickWeighted(segments);
      const idx = Math.max(0, segments.findIndex(s=>s.label===seg.label));
      const degrees = 360*6 + (idx * (360/segments.length));
      $('wheelEl').style.transform = `rotate(${degrees}deg)`;
      let updates = { realBalance: (userProfile.realBalance||0)-bet };
      let resultText = '';
      if (seg.type === 'tickets') { updates.tickets = (userProfile.tickets||0)+Number(seg.value||0); resultText = `ربحت ${seg.value} تذاكر`; }
      else { const win = +(bet * Number(seg.value||0)).toFixed(2); updates.realBalance += win; resultText = `${seg.label} — ${money(win)}`; }
      await update('users/'+currentUser.uid, updates);
      await push('wheel_logs', { uid: currentUser.uid, bet, result: seg, adminForced: !!forced });
      if (forced?.timesLeft) await update('global_system/wheel_forced/'+currentUser.uid, { ...forced, timesLeft: forced.timesLeft-1 });
      setTimeout(()=>{$('wheelResult').textContent=resultText; toast(resultText);}, 1100);
    };

    window.addCustomCode=async()=>{await push('global_system/customHTMLList',{name:$('codeName').value,code:$('codeBody').value,active:true,archived:false});toast('تم إضافة الكود');adminCodeInject()};
    window.toggleCode=async(id,state)=>{await update('global_system/customHTMLList/'+id,{active:state});adminCodeInject()};
    function adminCleaner(){ $('adminPanel').innerHTML=`<h2>🧹 تنظيف بيانات التجربة</h2><p class="danger">استخدمها فقط قبل الإطلاق.</p><button class="btn red" onclick="cleanBalances()">تصفير أرصدة كل المستخدمين</button> <button class="btn red" onclick="cleanRequests()">مسح طلبات الإيداع والسحب والدعم</button>`; }
    window.cleanBalances=async()=>{const users=await get('users',{});const updates={};Object.keys(users||{}).forEach(uid=>{updates['users/'+uid+'/realBalance']=0;updates['users/'+uid+'/bonusBalance']=0;updates['users/'+uid+'/reservedBalance']=0;});await ref().update(updates);toast('تم تصفير الأرصدة')};
    window.cleanRequests=async()=>{await set('deposit_requests',null);await set('withdraw_requests',null);await set('support_tickets',null);toast('تم تنظيف الطلبات')};

    function showWelcomeOnce(){ if(sessionStorage.getItem('adnor_welcome_done')) return; const w=globalSettings.welcome||DEFAULTS.welcome; if(!w.active)return; sessionStorage.setItem('adnor_welcome_done','1'); const div=document.createElement('div'); div.className='modal'; div.innerHTML=`<div class="royal-card modal-card center"><h2>${safe(w.title||'ADNOR')}</h2><p>${safe(w.message||'أهلاً بك')}</p><button class="btn" onclick="this.closest('.modal').remove()">دخول</button></div>`; document.body.appendChild(div); setTimeout(()=>div.remove(), Number(w.seconds||3)*1000); }
  </script>
</body>
</html>
